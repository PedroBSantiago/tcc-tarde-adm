<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Explorar +</title>
     <link rel="stylesheet" href="../css/cadastro.css">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</head>
<body>
    <div class="container">
      <div class="coll">
        <form action="../php/insert_de_users.php" method="post">
          <h1>Cadastro</h1>
          <div class="mb-3">
            <label for="name" class="form-label">Nome</label>
            <input
              type="name"
              class="form-control"
              name="nome"
              aria-describedby="nameHelp"
              required
            />
            <label for="email" class="form-label">Endereço de email</label>
            <input
              type="email"
              class="form-control"
              name="email"
              aria-describedby="emailHelp"
              required
            />
          </div>
          <div class="mb-3" id="senhacont">
            <label for="password" class="form-label">Senha</label>
            <input
              type="password"
              id="senhat"
              class="form-control"
              name="password"
              minlength="8"
              maxlength="20"
              pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}"
              title="A senha deve ter no mínimo 8 caracteres, incluindo letra maiúscula, letra minúscula, número e caractere especial."
              required
    
            />
            <button type="button" class="botaoquemostra" onclick="mostrarsenha()">👁</button>
            <p>A senha deve ter no mínimo 8 caracteres, incluindo letra maiúscula, letra minúscula, número e caractere especial.</p>
          </div>
          <button class="btn btn-primary" type="submit">Cadastrar</button>
          <a class="btn btn-primary" href="./login.html" role="button"
            >Login</a
          >
          <script src="../JS/senha.js"></script>
</body>
</html>
